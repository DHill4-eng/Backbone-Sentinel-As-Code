# ---------------------------------------------------------------------------
# GitHub Actions Workflow: Deploy Microsoft Sentinel Infrastructure & Content
# ---------------------------------------------------------------------------
# Equivalent of Pipelines/Sentinel-Deploy.yml for GitHub-hosted repos.
#
# Prerequisites:
#   - Azure Service Principal with Contributor + Microsoft Sentinel Contributor
#   - Federated credentials (OIDC) configured for this repo
#   - CustomDetection.ReadWrite.All Graph permission for Stage 5
#
# Required repository file:
#   customers.json - Customer deployment targets (name, subscriptionId, tenantId,
#                    oidcClientId, location, resourceGroup/resourceGroupName, workspace)
#
# Optional variables (Settings > Secrets and variables > Variables):
#   PLAYBOOK_RESOURCE_GROUP   - (Optional) Resource Group for playbooks
#
# Authentication: Uses OIDC (federated credentials) by default.
# ---------------------------------------------------------------------------

name: Deploy Sentinel

on:
  workflow_dispatch:
    inputs:
      customer:
        description: "Customer name (must exactly match customers.json)"
        type: string
        required: true

      # ── Stage Toggles ────────────────────────────────────────────────
      deploy_infrastructure:
        description: "Stage 1-2: Deploy Infrastructure (Bicep)"
        type: boolean
        default: true
      deploy_content_hub:
        description: "Stage 3: Deploy Content Hub Solutions"
        type: boolean
        default: true
      deploy_custom_content:
        description: "Stage 4: Deploy Custom Content"
        type: boolean
        default: true
      deploy_defender_detections:
        description: "Stage 5: Deploy Defender XDR Custom Detections"
        type: boolean
        default: true

      # ── Infrastructure (Stage 2) ─────────────────────────────────────
      daily_quota:
        description: "Bicep: Daily Quota (GB, 0 = unlimited)"
        type: number
        default: 0
      retention_in_days:
        description: "Bicep: Interactive Retention (days, 30-730)"
        type: number
        default: 90
      total_retention_in_days:
        description: "Bicep: Total Retention incl. Archive (0 = same as interactive)"
        type: number
        default: 0

      # ── Content Hub (Stage 3) ────────────────────────────────────────
      solutions:
        description: "Content Hub: Solutions (comma-separated)"
        type: string
        default: "Microsoft Defender XDR,Azure Activity,Microsoft Entra ID,Microsoft Defender for Cloud,Microsoft 365,Microsoft Defender for Endpoint,Windows Security Events,Threat Intelligence (New),UEBA Essentials"
      severities_to_include:
        description: "Content Hub: Analytics Rule Severities"
        type: string
        default: "High,Medium,Low,Informational"
      disable_rules:
        description: "Content Hub: Deploy Analytics Rules as Disabled"
        type: boolean
        default: true
      protect_customised_rules:
        description: "Content Hub: Protect Customised Rules"
        type: boolean
        default: true
      skip_analytics_rules:
        description: "Content Hub: Skip Analytics Rules"
        type: boolean
        default: false
      skip_workbooks:
        description: "Content Hub: Skip Workbooks"
        type: boolean
        default: false
      skip_automation_rules:
        description: "Content Hub: Skip Automation Rules"
        type: boolean
        default: false
      skip_hunting_queries:
        description: "Content Hub: Skip Hunting Queries"
        type: boolean
        default: false

      # ── Custom Content (Stage 4) ─────────────────────────────────────
      skip_custom_parsers:
        description: "Custom: Skip KQL Parsers/Functions"
        type: boolean
        default: false
      skip_custom_detections:
        description: "Custom: Skip Analytical Rules (YAML)"
        type: boolean
        default: false
      skip_custom_watchlists:
        description: "Custom: Skip Watchlists (JSON+CSV)"
        type: boolean
        default: false
      skip_custom_playbooks:
        description: "Custom: Skip Playbooks (ARM)"
        type: boolean
        default: false
      skip_custom_workbooks:
        description: "Custom: Skip Workbooks (Gallery JSON)"
        type: boolean
        default: false
      skip_custom_hunting_queries:
        description: "Custom: Skip Hunting Queries (YAML)"
        type: boolean
        default: false
      skip_custom_automation_rules:
        description: "Custom: Skip Automation Rules (JSON)"
        type: boolean
        default: false
      skip_custom_summary_rules:
        description: "Custom: Skip Summary Rules (JSON)"
        type: boolean
        default: false

      # ── General ──────────────────────────────────────────────────────
      smart_deployment:
        description: "Smart Deploy: only deploy changed/failed content"
        type: boolean
        default: true
      what_if:
        description: "Dry Run: preview changes without applying"
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  # ===========================================================================
  # Resolve Customer from customers.json
  # ===========================================================================
  resolve-customer:
    name: "Resolve Customer"
    runs-on: ubuntu-latest
    outputs:
      customer_name: ${{ steps.resolve.outputs.customer_name }}
      customer_key: ${{ steps.resolve.outputs.customer_key }}
      subscription_id: ${{ steps.resolve.outputs.subscription_id }}
      tenant_id: ${{ steps.resolve.outputs.tenant_id }}
      oidc_client_id: ${{ steps.resolve.outputs.oidc_client_id }}
      region: ${{ steps.resolve.outputs.region }}
      resource_group: ${{ steps.resolve.outputs.resource_group }}
      workspace_name: ${{ steps.resolve.outputs.workspace_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Customer Configuration
        id: resolve
        shell: pwsh
        run: |
          $customersPath = Join-Path $env:GITHUB_WORKSPACE "customers.json"
          if (-not (Test-Path $customersPath)) {
            throw "customers.json not found at '$customersPath'."
          }

          try {
            $customers = Get-Content -Path $customersPath -Raw | ConvertFrom-Json -ErrorAction Stop
          }
          catch {
            throw "Failed to parse customers.json: $($_.Exception.Message)"
          }

          if ($customers -isnot [System.Array]) {
            $customers = @($customers)
          }

          if ($customers.Count -eq 0) {
            throw "customers.json contains no customer entries."
          }

          $selectedCustomerName = "${{ inputs.customer }}"
          if ([string]::IsNullOrWhiteSpace($selectedCustomerName)) {
            throw "Input 'customer' is required."
          }

          $matches = @($customers | Where-Object { $_.name -ceq $selectedCustomerName })
          if ($matches.Count -eq 0) {
            $validNames = @($customers | ForEach-Object { $_.name } | Sort-Object) -join ", "
            throw "Unknown customer '$selectedCustomerName'. Valid customers: $validNames"
          }
          if ($matches.Count -gt 1) {
            throw "Multiple customers with the same name '$selectedCustomerName' found in customers.json. Names must be unique."
          }

          $customer = $matches[0]
          $resourceGroup = if (-not [string]::IsNullOrWhiteSpace([string]$customer.resourceGroup)) {
            [string]$customer.resourceGroup
          }
          elseif (-not [string]::IsNullOrWhiteSpace([string]$customer.resourceGroupName)) {
            [string]$customer.resourceGroupName
          }
          else {
            $null
          }

          $resolved = [ordered]@{
            name           = [string]$customer.name
            subscriptionId = [string]$customer.subscriptionId
            tenantId       = [string]$customer.tenantId
            oidcClientId   = [string]$customer.oidcClientId
            location       = [string]$customer.location
            resourceGroup  = [string]$resourceGroup
            workspace      = [string]$customer.workspace
          }

          $missing = @()
          foreach ($kvp in $resolved.GetEnumerator()) {
            if ([string]::IsNullOrWhiteSpace([string]$kvp.Value)) {
              $missing += $kvp.Key
            }
          }
          if ($missing.Count -gt 0) {
            throw "Customer '$($resolved.name)' is missing required field(s): $($missing -join ', ')."
          }

          $customerKey = $resolved.name.ToLowerInvariant() -replace '[^a-z0-9._-]', '-'
          if ([string]::IsNullOrWhiteSpace($customerKey)) {
            $customerKey = "customer"
          }

          Write-Host "Resolved customer: $($resolved.name)"
          Write-Host "Subscription: $($resolved.subscriptionId)"
          Write-Host "Tenant: $($resolved.tenantId)"
          Write-Host "Resource Group: $($resolved.resourceGroup)"
          Write-Host "Workspace: $($resolved.workspace)"
          Write-Host "Region: $($resolved.location)"

          "customer_name=$($resolved.name)" >> $env:GITHUB_OUTPUT
          "customer_key=$customerKey" >> $env:GITHUB_OUTPUT
          "subscription_id=$($resolved.subscriptionId)" >> $env:GITHUB_OUTPUT
          "tenant_id=$($resolved.tenantId)" >> $env:GITHUB_OUTPUT
          "oidc_client_id=$($resolved.oidcClientId)" >> $env:GITHUB_OUTPUT
          "region=$($resolved.location)" >> $env:GITHUB_OUTPUT
          "resource_group=$($resolved.resourceGroup)" >> $env:GITHUB_OUTPUT
          "workspace_name=$($resolved.workspace)" >> $env:GITHUB_OUTPUT

  # ===========================================================================
  # Stage 1: Check Existing Infrastructure
  # ===========================================================================
  check-infrastructure:
    name: "Check Existing Infrastructure"
    runs-on: ubuntu-latest
    needs: resolve-customer
    if: ${{ inputs.deploy_infrastructure != false }}
    env:
      RESOURCE_GROUP: ${{ needs.resolve-customer.outputs.resource_group }}
      WORKSPACE_NAME: ${{ needs.resolve-customer.outputs.workspace_name }}
      REGION: ${{ needs.resolve-customer.outputs.region }}
    outputs:
      resources_exist: ${{ steps.check.outputs.resources_exist }}
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ needs.resolve-customer.outputs.oidc_client_id }}
          tenant-id: ${{ needs.resolve-customer.outputs.tenant_id }}
          subscription-id: ${{ needs.resolve-customer.outputs.subscription_id }}

      - name: Check for Existing Resources
        id: check
        uses: azure/powershell@v2
        with:
          azPSVersion: "latest"
          inlineScript: |
            Write-Host "Checking for existing Sentinel infrastructure..."
            $resourcesExist = "false"

            $rg = Get-AzResourceGroup -Name "${{ env.RESOURCE_GROUP }}" -ErrorAction SilentlyContinue
            if ($rg) {
                $law = Get-AzOperationalInsightsWorkspace `
                    -ResourceGroupName "${{ env.RESOURCE_GROUP }}" `
                    -Name "${{ env.WORKSPACE_NAME }}" `
                    -ErrorAction SilentlyContinue
                if ($law) {
                    Write-Host "Workspace '${{ env.WORKSPACE_NAME }}' exists — skipping Bicep."
                    $resourcesExist = "true"
                } else {
                    Write-Host "Workspace not found — Bicep deployment required."
                }
            } else {
                Write-Host "Resource Group not found — full Bicep deployment required."
            }

            echo "resources_exist=$resourcesExist" >> $env:GITHUB_OUTPUT

  # ===========================================================================
  # Stage 2: Deploy Infrastructure (Bicep)
  # ===========================================================================
  deploy-infrastructure:
    name: "Deploy Sentinel Infrastructure (Bicep)"
    runs-on: ubuntu-latest
    needs: [resolve-customer, check-infrastructure]
    if: |
      always() &&
      needs.resolve-customer.result == 'success' &&
      needs.check-infrastructure.result == 'success' &&
      needs.check-infrastructure.outputs.resources_exist == 'false'
    env:
      RESOURCE_GROUP: ${{ needs.resolve-customer.outputs.resource_group }}
      WORKSPACE_NAME: ${{ needs.resolve-customer.outputs.workspace_name }}
      REGION: ${{ needs.resolve-customer.outputs.region }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ needs.resolve-customer.outputs.oidc_client_id }}
          tenant-id: ${{ needs.resolve-customer.outputs.tenant_id }}
          subscription-id: ${{ needs.resolve-customer.outputs.subscription_id }}

      - name: Register Resource Providers
        uses: azure/cli@v2
        with:
          inlineScript: |
            az provider register --namespace Microsoft.OperationsManagement --wait
            az provider register --namespace Microsoft.SecurityInsights --wait

      - name: Deploy Bicep Templates
        uses: azure/cli@v2
        with:
          inlineScript: |
            az deployment sub create \
              --location "${{ env.REGION }}" \
              --template-file Bicep/main.bicep \
              --parameters \
                rgLocation="${{ env.REGION }}" \
                rgName="${{ env.RESOURCE_GROUP }}" \
                lawName="${{ env.WORKSPACE_NAME }}" \
                dailyQuota=${{ inputs.daily_quota || 0 }} \
                retentionInDays=${{ inputs.retention_in_days || 90 }} \
                totalRetentionInDays=${{ inputs.total_retention_in_days || 0 }}

      - name: Wait for Workspace Indexing
        shell: pwsh
        run: |
          Write-Host "Waiting 60 seconds for Log Analytics workspace to become queryable..."
          Start-Sleep -Seconds 60
          Write-Host "Done."

      - name: Configure Sentinel Settings
        uses: azure/powershell@v2
        with:
          azPSVersion: "latest"
          inlineScript: |
            $token = (Get-AzAccessToken -ResourceUrl "https://management.azure.com" -WarningAction SilentlyContinue)
            if ($token.Token -is [System.Security.SecureString]) {
                $accessToken = $token.Token | ConvertFrom-SecureString -AsPlainText
            } else {
                $accessToken = $token.Token
            }
            $headers = @{
                Authorization  = "Bearer $accessToken"
                'Content-Type' = 'application/json'
            }
            $baseUri = "https://management.azure.com/subscriptions/${{ needs.resolve-customer.outputs.subscription_id }}/resourceGroups/${{ env.RESOURCE_GROUP }}/providers/Microsoft.OperationalInsights/workspaces/${{ env.WORKSPACE_NAME }}"
            $api = "api-version=2024-01-01-preview"

            $settings = @(
                @{ name = 'Anomalies';       body = @{ kind = 'Anomalies';       etag = $null; properties = @{} } }
                @{ name = 'EyesOn';          body = @{ kind = 'EyesOn';          etag = $null; properties = @{} } }
                @{ name = 'EntityAnalytics'; body = @{ kind = 'EntityAnalytics'; etag = $null; properties = @{ entityProviders = @('AzureActiveDirectory') } } }
                @{ name = 'Ueba';            body = @{ kind = 'Ueba';            etag = $null; properties = @{ dataSources = @('AuditLogs','AzureActivity','SigninLogs','SecurityEvent') } } }
            )

            foreach ($s in $settings) {
                $uri = "$baseUri/providers/Microsoft.SecurityInsights/settings/$($s.name)?$api"
                # GET current setting to retrieve etag
                try {
                    $getHeaders = @{ Authorization = "Bearer $accessToken" }
                    $current = Invoke-RestMethod -Uri $uri -Method Get -Headers $getHeaders
                    if ($current.etag) { $s.body['etag'] = $current.etag }
                } catch {}

                $json = $s.body | ConvertTo-Json -Depth 5

                $putHeaders = @{
                    Authorization  = "Bearer $accessToken"
                    'Content-Type' = 'application/json'
                    'If-Match'     = if ($s.body.etag) { $s.body.etag } else { '*' }
                }

                try {
                    Invoke-RestMethod -Uri $uri -Method Put -Headers $putHeaders -Body $json | Out-Null
                    Write-Host "Configured: $($s.name)"
                }
                catch {
                    $errorBody = $null
                    if ($_.Exception.Response) {
                        try {
                            $stream = $_.Exception.Response.GetResponseStream()
                            $reader = [System.IO.StreamReader]::new($stream)
                            $errorBody = $reader.ReadToEnd()
                            $reader.Close()
                        } catch {}
                    }
                    if ($errorBody) {
                        Write-Warning "Failed to configure $($s.name): $($_.Exception.Message) — $errorBody"
                    } else {
                        Write-Warning "Failed to configure $($s.name): $($_.Exception.Message)"
                    }
                }
            }

  # ===========================================================================
  # Stage 3: Deploy Content Hub
  # ===========================================================================
  deploy-content-hub:
    name: "Deploy Sentinel Content Hub"
    runs-on: ubuntu-latest
    needs: [resolve-customer, check-infrastructure, deploy-infrastructure]
    if: |
      always() &&
      needs.resolve-customer.result == 'success' &&
      (inputs.deploy_content_hub != false) &&
      (needs.deploy-infrastructure.result == 'success' || needs.deploy-infrastructure.result == 'skipped')
    env:
      RESOURCE_GROUP: ${{ needs.resolve-customer.outputs.resource_group }}
      WORKSPACE_NAME: ${{ needs.resolve-customer.outputs.workspace_name }}
      REGION: ${{ needs.resolve-customer.outputs.region }}
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ needs.resolve-customer.outputs.oidc_client_id }}
          tenant-id: ${{ needs.resolve-customer.outputs.tenant_id }}
          subscription-id: ${{ needs.resolve-customer.outputs.subscription_id }}

      - name: Deploy Content Hub Solutions
        uses: azure/powershell@v2
        with:
          azPSVersion: "latest"
          inlineScript: |
            $solutionList = "${{ inputs.solutions || 'Microsoft Defender XDR,Azure Activity' }}" -split ',' | ForEach-Object { $_.Trim() }
            $severityList = "${{ inputs.severities_to_include || 'High,Medium,Low,Informational' }}" -split ',' | ForEach-Object { $_.Trim() }

            $scriptParams = @{
                SubscriptionId      = "${{ needs.resolve-customer.outputs.subscription_id }}"
                ResourceGroup       = "${{ env.RESOURCE_GROUP }}"
                Workspace           = "${{ env.WORKSPACE_NAME }}"
                Region              = "${{ env.REGION }}"
                Solutions           = $solutionList
                SeveritiesToInclude = $severityList
            }

            if ("${{ inputs.disable_rules }}" -ne "false")            { $scriptParams['DisableRules']            = $true }
            if ("${{ inputs.protect_customised_rules }}" -ne "false")  { $scriptParams['ProtectCustomisedRules']   = $true }
            if ("${{ inputs.skip_analytics_rules }}" -eq "true")       { $scriptParams['SkipAnalyticsRules']       = $true }
            if ("${{ inputs.skip_workbooks }}" -eq "true")             { $scriptParams['SkipWorkbooks']            = $true }
            if ("${{ inputs.skip_automation_rules }}" -eq "true")      { $scriptParams['SkipAutomationRules']      = $true }
            if ("${{ inputs.skip_hunting_queries }}" -eq "true")       { $scriptParams['SkipHuntingQueries']       = $true }
            if ("${{ inputs.what_if }}" -eq "true")                    { $scriptParams['WhatIf']                   = $true }

            & "${{ github.workspace }}/Scripts/Deploy-SentinelContentHub.ps1" @scriptParams

  # ===========================================================================
  # Stage 4: Deploy Custom Content
  # ===========================================================================
  deploy-custom-content:
    name: "Deploy Custom Content"
    runs-on: ubuntu-latest
    needs: [resolve-customer, check-infrastructure, deploy-infrastructure, deploy-content-hub]
    if: |
      always() &&
      needs.resolve-customer.result == 'success' &&
      (inputs.deploy_custom_content != false) &&
      (needs.deploy-content-hub.result == 'success' || needs.deploy-content-hub.result == 'skipped')
    env:
      RESOURCE_GROUP: ${{ needs.resolve-customer.outputs.resource_group }}
      WORKSPACE_NAME: ${{ needs.resolve-customer.outputs.workspace_name }}
      REGION: ${{ needs.resolve-customer.outputs.region }}
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # Smart deployment needs parent commit for git diff

      - name: Restore Deployment State
        uses: actions/cache/restore@v4
        continue-on-error: true
        with:
          path: ${{ github.workspace }}/.deployment-state.json
          key: deployment-state-${{ needs.resolve-customer.outputs.customer_key }}-${{ env.WORKSPACE_NAME }}-
          restore-keys: |
            deployment-state-${{ needs.resolve-customer.outputs.customer_key }}-${{ env.WORKSPACE_NAME }}-

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ needs.resolve-customer.outputs.oidc_client_id }}
          tenant-id: ${{ needs.resolve-customer.outputs.tenant_id }}
          subscription-id: ${{ needs.resolve-customer.outputs.subscription_id }}

      - name: Install powershell-yaml Module
        shell: pwsh
        run: |
          Install-Module -Name powershell-yaml -Force -Scope CurrentUser -AllowClobber

      - name: Deploy Custom Content
        uses: azure/powershell@v2
        with:
          azPSVersion: "latest"
          inlineScript: |
            $scriptParams = @{
                SubscriptionId = "${{ needs.resolve-customer.outputs.subscription_id }}"
                ResourceGroup  = "${{ env.RESOURCE_GROUP }}"
                Workspace      = "${{ env.WORKSPACE_NAME }}"
                Region         = "${{ env.REGION }}"
                BasePath       = "${{ github.workspace }}"
            }

            $playbookRG = "${{ vars.PLAYBOOK_RESOURCE_GROUP }}"
            if ($playbookRG) { $scriptParams['PlaybookResourceGroup'] = $playbookRG }

            if ("${{ inputs.skip_custom_parsers }}" -eq "true")          { $scriptParams['SkipParsers']         = $true }
            if ("${{ inputs.skip_custom_detections }}" -eq "true")       { $scriptParams['SkipDetections']      = $true }
            if ("${{ inputs.skip_custom_watchlists }}" -eq "true")       { $scriptParams['SkipWatchlists']     = $true }
            if ("${{ inputs.skip_custom_playbooks }}" -eq "true")        { $scriptParams['SkipPlaybooks']      = $true }
            if ("${{ inputs.skip_custom_workbooks }}" -eq "true")        { $scriptParams['SkipWorkbooks']      = $true }
            if ("${{ inputs.skip_custom_hunting_queries }}" -eq "true")  { $scriptParams['SkipHuntingQueries'] = $true }
            if ("${{ inputs.skip_custom_automation_rules }}" -eq "true") { $scriptParams['SkipAutomationRules']= $true }
            if ("${{ inputs.skip_custom_summary_rules }}" -eq "true")   { $scriptParams['SkipSummaryRules']   = $true }
            if ("${{ inputs.smart_deployment }}" -ne "false")            { $scriptParams['SmartDeployment']    = $true }
            if ("${{ inputs.what_if }}" -eq "true")                      { $scriptParams['WhatIf']             = $true }

            & "${{ github.workspace }}/Scripts/Deploy-CustomContent.ps1" @scriptParams

      - name: Save Deployment State
        if: always()
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}/.deployment-state.json
          key: deployment-state-${{ needs.resolve-customer.outputs.customer_key }}-${{ env.WORKSPACE_NAME }}-${{ github.run_id }}

  # ===========================================================================
  # Stage 5: Deploy Defender XDR Custom Detections
  # ===========================================================================
  deploy-defender-detections:
    name: "Deploy Defender XDR Custom Detections"
    runs-on: ubuntu-latest
    needs: [resolve-customer, check-infrastructure, deploy-infrastructure, deploy-content-hub, deploy-custom-content]
    if: |
      always() &&
      needs.resolve-customer.result == 'success' &&
      (inputs.deploy_defender_detections != false) &&
      (needs.deploy-custom-content.result == 'success' || needs.deploy-custom-content.result == 'skipped')
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ needs.resolve-customer.outputs.oidc_client_id }}
          tenant-id: ${{ needs.resolve-customer.outputs.tenant_id }}
          subscription-id: ${{ needs.resolve-customer.outputs.subscription_id }}

      - name: Install powershell-yaml Module
        shell: pwsh
        run: |
          Install-Module -Name powershell-yaml -Force -Scope CurrentUser -AllowClobber

      - name: Deploy Defender Custom Detections
        uses: azure/powershell@v2
        with:
          azPSVersion: "latest"
          inlineScript: |
            $scriptParams = @{
                BasePath = "${{ github.workspace }}"
            }

            if ("${{ inputs.what_if }}" -eq "true") { $scriptParams['WhatIf'] = $true }

            & "${{ github.workspace }}/Scripts/Deploy-DefenderDetections.ps1" @scriptParams
